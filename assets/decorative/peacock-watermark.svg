    <ellipse cx="540" cy="60" rx="14" ry="10" opacity="0.6"/>
    <ellipse cx="620" cy="70" rx="14" ry="10" opacity="0.55"/>
    <ellipse cx="680" cy="110" rx="14" ry="10" opacity="0.5"/>
    <ellipse cx="740" cy="160" rx="14" ry="10" opacity="0.4"/>
